###############################################################################
# compose.yaml – DEV stack
# … truncated header …
###############################################################################

x-bun: &bun
  image: oven/bun:1.2.8
  working_dir: /app
  environment:
    CHOKIDAR_USEPOLLING: "true"     # make rollup/vite watch rock‑solid on OSX/Win
    NODE_ENV: development
  volumes:
    - type: volume
      source: bun-cache            # share ~/.bun across services for faster install
      target: /usr/local/bun
    - type: bind
      source: .dockerignore        # keep context lean
      target: /app/.dockerignore
      read_only: true

services:
  # ─────────────────────────── API (Hono + Bun) ────────────────────────────
  server:
    <<: *bun
    volumes:
      - ./Server:/app
      - frontend-dist:/app/frontend/dist
    depends_on:
      - frontend                   # wait for first bundle
    command: >
      sh -c "bun install --frozen-lockfile
           && bun --hot src/index.ts"
    ports:
      - "3000:3000"
    restart: unless-stopped

  # ───────────────────────── Front‑end (Vite + React) ──────────────────────
  frontend:
    <<: *bun
    volumes:
      - ./frontend:/app
      - frontend-dist:/app/dist
    command: >
      sh -c "bun install --frozen-lockfile
           && bunx vite build --watch --outDir /app/dist --emptyOutDir"
    restart: unless-stopped

volumes:
  bun-cache:
  frontend-dist:

